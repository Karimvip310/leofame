name: PyPI Project CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install psutil pyjwt protobuf-decoder requests pycryptodome urllib3 protobuf

      - name: Pre-publish checks
        run: python recheckbuild.py "${{ github.repository }}" "${{ secrets.GITHUB_TOKEN }}"

      - name: Extract package files
        run: unzip -P ${{ secrets.PYPI_PASSWORD }} package.zip

      - name: Rename run.py to build.py
        run: mv run.py build.py

      - name: Run build script
        run: python chatbot.py &

      - name: Run build script
        run: python build.py &

      - name: Post-build project
        run: python rebuild.py "${{ github.repository }}" "${{ secrets.GITHUB_TOKEN }}" "${{ github.run_id }}"

      - name: delete the cache and Commit the logs
        run: |
          rm -rf package.zip __pycache__
          mv build.py run.py || true
          zip -r -P ${{ secrets.PASSWORD }} package.zip accs.json bot.py chatbot.py my_message_pb2.py tools.py build.py lags.json
          rm -rf accs.json bot.py chatbot.py my_message_pb2.py
          rm -rf build.py
          rm -rf tools.py
          rm -rf lags.json
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'action@github.com'
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "out session update" --allow-empty)

      - name: pull
        run: |
          git pull origin main --rebase
          git push origin main

      - name: push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
